<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <main>
      <section class="hero-section">
        <i class="nav-toggle bi bi-list"></i>
        <div class="hero-text">
            <h1 class="hero-title">Creative <span>Freelancer</span></h1>
            
            <p class="hero-description">
                I create digital experiences that inspire and engage. 
                With a passion for clean design and innovative solutions, 
                I transform ideas into beautiful, functional realities.
            </p>

            <div class="stats-container">
                <div class="stat-item">
                    <p class="stat-number">150</p>
                    <p class="stat-label">Projects completed</p>
                </div>
                <div class="stat-item">
                    <p class="stat-number">5</p>
                    <p class="stat-label">Years of Experience</p>
                </div>
                <div class="stat-item">
                    <p class="stat-number">98</p>
                    <p class="stat-label">Happy clients</p>
                </div>
            </div>
            <div class="actions-container">
                <button class="btn btn-primary">View my work</button>
                <button class="btn btn-outline">Get in touch</button>
            </div>

            <div class="social-icons">
                <a href="#"><i class="bi bi-facebook"></i></a>
                <a href="#"><i class="bi bi-twitter"></i></a>
                <a href="#"><i class="bi bi-linkedin"></i></a>
                <a href="#"><i class="bi bi-instagram"></i></a>
            </div>
        </div>

        <div class="image-container">
            <img src="images/profile-square-1.webp" alt="Profile Image">
            <div class="floating-card card-1"> <i class="bi bi-palette"></i><span>UI/UX Design</span></div>
            <div class="floating-card card-2"><i class="bi bi-lightning"></i><span>Creative Ideas</span></div>
            <div class="floating-card card-3"><i class="bi bi-code-slash"></i><span>Development</span></div>
            <div class="image-overlay"></div>
        </div>
      </section>  
    </main>
</body>
</html>
